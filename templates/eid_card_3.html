<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eid Mubarak - Red Luxury Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #330000 0%, #1a0000 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Falling red rose petals */
    .petals {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .petal {
      position: absolute;
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #ff1a1a, #ff4d4d, #ff8080);
      clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
      opacity: 0.85;
      animation: fall linear infinite;
      box-shadow: 0 0 18px rgba(255, 30, 30, 0.7);
    }

    @keyframes fall {
      0%   { transform: translateY(-100vh) rotate(0deg); }
      100% { transform: translateY(120vh) rotate(1080deg); }
    }

    .card-container {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10;
    }

    .card {
      width: 100%;
      max-width: 580px;
      background: rgba(40, 0, 0, 0.70);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      border: 1px solid rgba(255, 80, 80, 0.18);
      box-shadow: 
        0 25px 60px rgba(0,0,0,0.7),
        inset 0 0 45px rgba(255, 40, 40, 0.12);
      padding: 50px 35px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transform: scale(0.92);
      opacity: 0;
      animation: cardPop 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
    }

    @keyframes cardPop {
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(45deg, #ff1a1a, #ff4d4d, #ff8080, #ff1a1a);
      border-radius: 28px;
      z-index: -2;
      animation: borderGlow 7s linear infinite;
      opacity: 0.75;
    }

    @keyframes borderGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 4px;
      background: radial-gradient(circle at 30% 30%, rgba(255,60,60,0.22), transparent 60%);
      border-radius: 24px;
      z-index: -1;
    }

    h1 {
      font-size: 4.2rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ff9999, #ff4d4d, #ff1a1a, #cc0000, #ff3333);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.3em;
      letter-spacing: 2px;
      text-shadow: 0 0 35px rgba(255, 50, 50, 0.7);
    }

    .subtitle {
      font-size: 1.6rem;
      color: #ffcccc;
      margin: 20px 0 40px;
      font-weight: 300;
      letter-spacing: 1.5px;
    }

    .names {
      margin: 45px 0 25px;
      font-size: 1.5rem;
      color: #ffdddd;
      font-weight: 400;
    }

    .from {
      color: #ff9999;
      font-style: italic;
      margin-top: 50px;
      font-size: 1.3rem;
      opacity: 0.92;
    }

    .heart {
      color: #ff1a1a;
      font-size: 1.8rem;
      margin: 0 10px;
    }

    /* Responsive */
    @media (max-width: 580px) {
      .card {
        padding: 40px 25px;
        margin: 15px;
      }
      
      h1 {
        font-size: 3.4rem;
      }
      
      .subtitle {
        font-size: 1.4rem;
      }
      
      .names {
        font-size: 1.35rem;
      }
      
      .from {
        font-size: 1.15rem;
      }
    }

    @media (max-width: 400px) {
      h1 {
        font-size: 2.9rem;
      }
      
      .subtitle {
        font-size: 1.25rem;
      }
      
      .card {
        padding: 35px 20px;
      }
    }

    .home-btn {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 9999;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      backdrop-filter: blur(8px);
      transition: background 0.2s ease;
    }

    .home-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

  <a href="/" class="home-btn">Home</a>

  <div class="petals" id="petalsContainer"></div>

  <div class="card-container">
    <div class="card">
      <h1>Eid Mubarak</h1>
      <div class="subtitle">May this Eid bring endless joy, peace & blessings</div>
      
      <div class="names">
        To: <span style="color:#ff9999;font-weight:600;">{{toname}}</span>
        <span class="heart">♥</span>
        From: <span style="color:#ff6666;font-weight:600;">{{fromname}}</span>
      </div>

      <div class="from">
        With love & duas
      </div>
    </div>
  </div>

  <script>
    function createPetal() {
      const petal = document.createElement('div');
      petal.className = 'petal';
      
      const size = Math.random() * 18 + 12;
      petal.style.width = size + 'px';
      petal.style.height = size + 'px';
      
      petal.style.left = Math.random() * 100 + 'vw';
      petal.style.animationDuration = Math.random() * 8 + 10 + 's';
      petal.style.animationDelay = Math.random() * 5 + 's';
      petal.style.opacity = Math.random() * 0.4 + 0.6;
      
      // Various shades of red/pink-red
      const hue = Math.random() * 20 + 340; // around 340–360 = deep red to pinkish red
      petal.style.background = `hsl(${hue}, 90%, 60%)`;
      
      document.getElementById('petalsContainer').appendChild(petal);
      
      setTimeout(() => {
        petal.remove();
      }, 18000);
    }

    setInterval(createPetal, 300);

    // Initial burst
    for(let i = 0; i < 20; i++) {
      setTimeout(createPetal, i * 160);
    }
  </script>
</body>
</html>
